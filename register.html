<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Register | tanken.chat</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="topbar">
  <a href="index.html">
    <img src="assets/logo.png" alt="tanken.chat logo" class="logo-register">
  </a>
</header>

<main class="register-wrapper">

  <section class="register-card">

    <h1>Register free</h1>

    <p>
      After registration, you receive exactly one WhatsApp welcome message.  
      Reply <span class="inline-pill">START</span> to finish activation.
    </p>

    <form id="registerForm">

      <label>Mobile number</label>
      <input type="text" placeholder="+491701234567" required>

      <label>User name</label>
      <input type="text" placeholder="Marcelo" required>

      <label>Preferred fuel</label>
      <select>
        <option>Diesel</option>
        <option>E5</option>
        <option>E10</option>
      </select>

      <label>Maximum radius</label>
      <select>
        <option>5 km</option>
        <option selected>10 km</option>
        <option>15 km</option>
        <option>20 km</option>
      </select>

      <label>Preferred language</label>
      <select>
        <option>German</option>
        <option>English</option>
        <option>Turkish</option>
        <option>Arabic</option>
      </select>

      <div class="check-group">
        <label><input type="checkbox"> I accept the Privacy Policy.</label>
        <label><input type="checkbox"> I accept the Terms and Conditions.</label>
        <label><input type="checkbox"> I agree to receive service replies through WhatsApp.</label>
        <label><input type="checkbox"> I agree to receive one WhatsApp welcome message from tanken.chat with activation instructions.</label>
      </div>

      <button type="submit" class="btn-primary full-btn">
        Complete registration
      </button>

    </form>

  </section>

</main>

</body>
</html>
